name: Build and Trigger Deploy (Azure)

on:
  push:
    branches:
      - main

env:
  AZURE_CLIENT_ID: "352b4671-3617-4e74-a9ce-52f8757b3a3b"
  AZURE_TENANT_ID: "ce9cc904-22b6-49ae-9158-62b6553f1d62"
  AZURE_SUBSCRIPTION_ID: "60c91a22-3081-4d8f-98a0-cbb574a2a5d5"
  ACR_NAME: "candleregistry" # Name of your Azure Container Registry (e.g., myregistry)
  IMAGE_NAME: "candle-store-app"

jobs:
  build-and-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Azure OIDC login

    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      # Tokenless OIDC Login using Azure Service Principal
      - name: Authenticate to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      # Logs into your Azure Container Registry using the authenticated Azure session
      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      # Builds and pushes container using the unique Git Commit SHA as the version tag
      - name: Build and Push Docker Container
        run: |
          IMAGE_URL="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL

      # THE HANDSHAKE: Signals your candle-store-TF repo that a new Azure image is ready
      - name: Trigger Infrastructure Pipeline
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_ACCESS_TOKEN }}
          repository: inaboya-llc/candle-store-AZ_TF
          event-type: deploy-triggered-by-app
          client-payload: '{"image_tag": "${{ github.sha }}"}'
